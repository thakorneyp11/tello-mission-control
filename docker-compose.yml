services:
  backend:
    build: ./backend
    container_name: tello-backend
    env_file: .env
    ports:
      - "${TELLO_API_PORT:-8000}:8000"
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: tello-frontend
    ports:
      - "${TELLO_FRONTEND_PORT:-3000}:80"
    depends_on:
      - backend
    restart: unless-stopped
